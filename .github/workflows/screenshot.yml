name: Screenshot Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packages
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run bot
        run: node index.js
